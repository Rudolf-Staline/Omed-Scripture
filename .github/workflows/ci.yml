name: CI

on:
  pull_request:
  push:
    branches: [main]

# Annule les exécutions précédentes encore en cours sur la même réf (PR/branche)
# pour éviter une file d'attente inutile et accélérer le retour CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Validate Bible data
        run: npm run bible:validate
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
